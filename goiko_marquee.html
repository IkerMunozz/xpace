<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goiko Style Infinite Marquee</title>
    <style>
        :root {
            --bg-color: #111;
            --text-color: #fff;
            --marquee-speed: 20s;
            --font-size: clamp(2rem, 8vw, 5rem);
            --gap: 40px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #222;
            font-family: 'Arial Black', 'Arial Bold', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* COMPONENTE MARQUEE */
        .goiko-marquee {
            width: 100%;
            background: var(--bg-color);
            overflow: hidden;
            padding: 20px 0;
            position: relative;
            user-select: none;
            /* Ligera inclinación estilo street food */
            transform: skewY(-2deg);
            border-top: 2px solid #ff2d55;
            border-bottom: 2px solid #ff2d55;
            box-shadow: 0 0 30px rgba(255, 45, 85, 0.2);
        }

        /* Gradientes laterales para el efecto fade */
        .goiko-marquee::before,
        .goiko-marquee::after {
            content: "";
            position: absolute;
            top: 0;
            width: 150px;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .goiko-marquee::before {
            left: 0;
            background: linear-gradient(to right, var(--bg-color), transparent);
        }

        .goiko-marquee::after {
            right: 0;
            background: linear-gradient(to left, var(--bg-color), transparent);
        }

        .marquee-track {
            display: flex;
            width: max-content;
            animation: scroll var(--marquee-speed) linear infinite;
            will-change: transform;
        }

        /* Pausa en hover */
        .goiko-marquee:hover .marquee-track {
            animation-play-state: paused;
        }

        .marquee-content {
            display: flex;
            align-items: center;
            gap: var(--gap);
            padding-right: var(--gap); /* Mantener espaciado entre loops */
        }

        .marquee-item {
            color: var(--text-color);
            font-size: var(--font-size);
            font-weight: 900;
            text-transform: uppercase;
            white-space: nowrap;
            letter-spacing: -2px;
            /* Texto condensado moderno */
            font-stretch: extra-condensed;
        }

        .marquee-item span {
            color: #ff2d55; /* Punto/separador en color de marca */
            margin: 0 10px;
        }

        /* Dirección invertida con clase */
        .goiko-marquee.reverse .marquee-track {
            animation-direction: reverse;
        }

        /* Animación fluida usando transform: translate3d para GPU acceleration */
        @keyframes scroll {
            0% {
                transform: translate3d(0, 0, 0);
            }
            100% {
                /* Nos movemos exactamente la mitad del ancho total del track (que está duplicado) */
                transform: translate3d(-50%, 0, 0);
            }
        }

        /* Accesibilidad: Respetar preferencias de movimiento reducido */
        @media (prefers-reduced-motion: reduce) {
            .marquee-track {
                animation: none;
                transform: none;
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            :root {
                --gap: 20px;
            }
            .goiko-marquee {
                padding: 10px 0;
            }
        }
    </style>
</head>
<body>

    <!--
        EXPLICACIÓN DEL LOOP INFINITO:
        Para lograr un scroll infinito sin saltos, el contenido de '.marquee-track' se duplica (se repite dos veces).
        La animación CSS desplaza el track desde 0% hasta -50%. 
        Como la segunda mitad es idéntica a la primera, en el momento en que llega al -50%, 
        el ojo humano no percibe el "salto" cuando la animación vuelve a empezar desde el 0%.
    -->

    <div class="goiko-marquee" id="marqueeComponent">
        <div class="marquee-track">
            <!-- El contenido se duplica automáticamente mediante JS para asegurar que el track sea suficientemente largo -->
            <div class="marquee-content" id="marqueeContent">
                <div class="marquee-item">FOREVER CHORREO <span>•</span></div>
                <div class="marquee-item">FOREVER CHORREO <span>•</span></div>
                <div class="marquee-item">FOREVER CHORREO <span>•</span></div>
            </div>
            <!-- Duplicado manual o vía script -->
            <div class="marquee-content" aria-hidden="true">
                <div class="marquee-item">FOREVER CHORREO <span>•</span></div>
                <div class="marquee-item">FOREVER CHORREO <span>•</span></div>
                <div class="marquee-item">FOREVER CHORREO <span>•</span></div>
            </div>
        </div>
    </div>

    <script>
        // Opcional: Duplicar contenido dinámicamente si fuera necesario para tracks muy cortos
        // En este ejemplo, el HTML ya viene con el duplicado necesario para el loop visual.
        
        // Función para cambiar la velocidad dinámicamente desde consola o botones
        function setSpeed(seconds) {
            document.documentElement.style.setProperty('--marquee-speed', seconds + 's');
        }
    </script>
</body>
</html>
