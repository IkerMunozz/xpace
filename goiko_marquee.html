<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goiko Style Infinite Marquee</title>
    <link rel="stylesheet" href="css/goiko_marquee.css">
</head>
<body>

    <!--
        EXPLICACIÓN DEL LOOP INFINITO:
        Para lograr un scroll infinito sin saltos, el contenido de '.marquee-track' se duplica (se repite dos veces).
        La animación CSS desplaza el track desde 0% hasta -50%. 
        Como la segunda mitad es idéntica a la primera, en el momento en que llega al -50%, 
        el ojo humano no percibe el "salto" cuando la animación vuelve a empezar desde el 0%.
    -->

    <div class="goiko-marquee" id="marqueeComponent">
        <div class="marquee-track">
            <!-- El contenido se duplica automáticamente mediante JS para asegurar que el track sea suficientemente largo -->
            <div class="marquee-content" id="marqueeContent">
                <div class="marquee-item">FOREVER CHORREO <span>•</span></div>
                <div class="marquee-item">FOREVER CHORREO <span>•</span></div>
                <div class="marquee-item">FOREVER CHORREO <span>•</span></div>
            </div>
            <!-- Duplicado manual o vía script -->
            <div class="marquee-content" aria-hidden="true">
                <div class="marquee-item">FOREVER CHORREO <span>•</span></div>
                <div class="marquee-item">FOREVER CHORREO <span>•</span></div>
                <div class="marquee-item">FOREVER CHORREO <span>•</span></div>
            </div>
        </div>
    </div>

    <script src="js/goiko_marquee.js"></script>
</body>
</html>
